{% extends "base.html" %}

{% block title %}Sign In - ScoutMe{% endblock %}

{% block content %}
<div class="flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl border border-gray-200 shadow-sm">
        
        <div class="text-center">
            <h2 class="text-3xl font-extrabold text-blue-950 tracking-tight">Welcome back</h2>
            <p class="mt-2 text-sm text-gray-500">Sign in to your account to continue</p>
        </div>

        <form class="mt-8 space-y-6">
            <div class="rounded-md space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input id="username" name="username" type="email" required placeholder="you@example.com" class="appearance-none rounded-lg relative block w-full px-3 py-2.5 border border-gray-300 placeholder-gray-400 text-gray-900 text-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input id="password" name="password" type="password" required placeholder="••••••••" class="appearance-none rounded-lg relative block w-full px-3 py-2.5 border border-gray-300 placeholder-gray-400 text-gray-900 text-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>

            <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-blue-600 hover:bg-blue-700 focus:outline-none transition shadow-sm">
                Sign In
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-4">
            Don't have an account? 
            <a href="/register" class="font-medium text-blue-600 hover:text-blue-500">Sign up</a>
        </p>

    </div>
</div>

<script>
document.querySelector('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const response = await fetch('/auth/login', {
        method: 'POST',
        body: formData
    });
    if (response.ok) {
        const data = await response.json();
        document.cookie = `access_token=Bearer ${data.access_token}; path=/; max-age=3600`;
        window.location.href = '/';
    } else {
        alert('Invalid email or password');
    }
});
</script>
{% endblock %}
