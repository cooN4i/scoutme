{% extends "base.html" %}

{% block title %}Create Account - ScoutMe{% endblock %}

{% block content %}
<div class="flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl border border-gray-200 shadow-sm">
        
        <div class="text-center">
            <h2 class="text-3xl font-extrabold text-blue-950 tracking-tight">Get started</h2>
            <p class="mt-2 text-sm text-gray-500">Create your account to unlock full features</p>
        </div>

        <form class="mt-8 space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input id="email" type="email" required placeholder="you@example.com" class="appearance-none rounded-lg relative block w-full px-3 py-2.5 border border-gray-300 placeholder-gray-400 text-gray-900 text-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input id="password" type="password" required placeholder="At least 8 characters" class="appearance-none rounded-lg relative block w-full px-3 py-2.5 border border-gray-300 placeholder-gray-400 text-gray-900 text-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>

            <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-blue-600 hover:bg-blue-700 focus:outline-none transition shadow-sm mt-4">
                Create Account
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-4">
            Already have an account? 
            <a href="/login" class="font-medium text-blue-600 hover:text-blue-500">Sign in</a>
        </p>

    </div>
</div>

<script>
document.querySelector('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    const response = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });
    if (response.ok) {
        window.location.href = '/login';
    } else {
        alert('Registration failed. Check if email is unique.');
    }
});
</script>
{% endblock %}
