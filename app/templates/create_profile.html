{% extends "base.html" %}

{% block title %}Create Player Profile - ScoutMe{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white p-8 rounded-xl border border-gray-200 shadow-sm">
    
    <div class="mb-8">
        <h2 class="text-3xl font-extrabold text-blue-950 tracking-tight">Create Player Profile</h2>
        <p class="mt-2 text-sm text-gray-500">Fill in your football details to register in the scout feed</p>
    </div>

    <form class="space-y-6" id="profileForm">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
                <label for="first_name" class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                <input id="first_name" type="text" required placeholder="John" class="appearance-none rounded-lg block w-full px-3 py-2.5 border border-gray-300 text-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label for="last_name" class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                <input id="last_name" type="text" required placeholder="Doe" class="appearance-none rounded-lg block w-full px-3 py-2.5 border border-gray-300 text-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
                <label for="birth_date" class="block text-sm font-medium text-gray-700 mb-1">Birth Date</label>
                <input id="birth_date" type="date" required max="2026-06-16" class="appearance-none rounded-lg block w-full px-3 py-2.5 border border-gray-300 text-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label for="preferred_foot" class="block text-sm font-medium text-gray-700 mb-1">Preferred Foot</label>
                <select id="preferred_foot" required class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5">
                    <option value="Right foot">Right foot</option>
                    <option value="Left foot">Left foot</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
                <label for="citizenship" class="block text-sm font-medium text-gray-700 mb-1">Citizenship (Nationality)</label>
                <input id="citizenship" type="text" required placeholder="Norway" class="appearance-none rounded-lg block w-full px-3 py-2.5 border border-gray-300 text-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label for="main_position_id" class="block text-sm font-medium text-gray-700 mb-1">Main Position</label>
                <select id="main_position_id" required class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5">
                    {% for position in positions %}
                        <option value="{{ position.id }}">{{ position.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Secondary Positions</label>
            <div class="grid grid-cols-3 sm:grid-cols-4 gap-3 bg-gray-50 p-4 rounded-xl border border-gray-200">
                {% for position in positions %}
                <label class="inline-flex items-center text-sm text-gray-700 cursor-pointer">
                    <input type="checkbox" name="secondary_positions" value="{{ position.id }}" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500 h-4 w-4">
                    <span class="ml-2 font-medium uppercase">{{ position.name }}</span>
                </label>
                {% endfor %}
            </div>
        </div>

        <div>
            <label for="photo" class="block text-sm font-medium text-gray-700 mb-1">Player Photo File</label>
            <input id="photo" type="file" accept="image/*" class="appearance-none rounded-lg block w-full px-3 py-2.5 border border-gray-300 text-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
        </div>

        <div>
            <label for="current_club" class="block text-sm font-medium text-gray-700 mb-1">Current Club</label>
            <input id="current_club" type="text" placeholder="Free Agent" class="appearance-none rounded-lg block w-full px-3 py-2.5 border border-gray-300 text-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
        </div>

        <div class="space-y-3">
            <div class="flex justify-between items-center">
                <label class="block text-sm font-medium text-gray-700">YouTube Video Highlights</label>
                <button type="button" id="addVideoBtn" class="bg-blue-50 hover:bg-blue-100 text-blue-700 font-semibold px-3 py-1 rounded-lg text-xs transition border border-blue-200">
                    + Add Video
                </button>
            </div>
            <div id="videosContainer" class="space-y-3"></div>
        </div>

        <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-semibold rounded-lg text-white bg-blue-600 hover:bg-blue-700 focus:outline-none transition shadow-sm mt-4">
            Save Profile
        </button>
    </form>

</div>

<script>
function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
}

function extractYouTubeId(urlOrId) {
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const match = urlOrId.match(regExp);
    return (match && match[2].length === 11) ? match[2] : urlOrId.trim();
}

document.getElementById('addVideoBtn').addEventListener('click', () => {
    const container = document.getElementById('videosContainer');
    const wrapper = document.createElement('div');
    wrapper.className = 'flex gap-3 items-center video-item bg-gray-50 p-3 rounded-lg border border-gray-200';
    wrapper.innerHTML = `
        <input type="text" placeholder="Video Title (e.g. Goals 2026)" class="video-title appearance-none rounded-lg block w-1/2 px-3 py-2 border border-gray-300 text-xs focus:outline-none focus:ring-blue-500 focus:border-blue-500">
        <input type="text" placeholder="YouTube URL or ID" class="video-id appearance-none rounded-lg block w-1/2 px-3 py-2 border border-gray-300 text-xs focus:outline-none focus:ring-blue-500 focus:border-blue-500" required>
        <button type="button" class="text-red-500 hover:text-red-700 font-bold px-2 text-sm remove-video-btn">✕</button>
    `;
    wrapper.querySelector('.remove-video-btn').addEventListener('click', () => wrapper.remove());
    container.appendChild(wrapper);
});

document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const token = getCookie('access_token');
    if (!token) {
        alert('Session expired. Please log in again.');
        window.location.href = '/login';
        return;
    }

    const birthDateValue = document.getElementById('birth_date').value;
    const birthYear = new Date(birthDateValue).getFullYear();
    if (birthYear > 2026 || birthYear < 1900) {
        alert('Please enter a valid birth date.');
        return;
    }

    const formData = new FormData();
    formData.append('first_name', document.getElementById('first_name').value);
    formData.append('last_name', document.getElementById('last_name').value);
    formData.append('birth_date', birthDateValue);
    formData.append('preferred_foot', document.getElementById('preferred_foot').value);
    formData.append('citizenship', document.getElementById('citizenship').value);
    formData.append('main_position_id', document.getElementById('main_position_id').value);
    formData.append('current_club', document.getElementById('current_club').value || "Free Agent");
    
    const secPositions = Array.from(document.querySelectorAll('input[name="secondary_positions"]:checked')).map(el => parseInt(el.value));
    formData.append('secondary_position_ids', JSON.stringify(secPositions));

    const videosList = [];
    document.querySelectorAll('.video-item').forEach(item => {
        const title = item.querySelector('.video-title').value;
        const rawIdValue = item.querySelector('.video-id').value;
        const youtube_id = extractYouTubeId(rawIdValue);
        if (youtube_id) {
            videosList.push({ title: title || "Highlights", youtube_id: youtube_id });
        }
    });
    formData.append('videos', JSON.stringify(videosList));

    const fileInput = document.getElementById('photo');
    if (fileInput.files[0]) {
        formData.append('photo', fileInput.files[0]);
    }

    const response = await fetch('/players/', {
        method: 'POST',
        headers: {
            'Authorization': decodeURIComponent(token)
        },
        body: formData
    });

    if (response.ok) {
        window.location.href = '/profile';
    } else {
        const errData = await response.json();
        alert('Failed to create profile: ' + (errData.detail || 'Validation error check your inputs'));
    }
});
</script>
{% endblock %}
