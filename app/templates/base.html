<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ScoutMe - Football Talent Platform{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            
            <a href="/" class="flex items-center space-x-3 hover:opacity-80 transition">
                <div class="w-8 h-8">
                    <img src="/static/images/logo.svg" alt="ScoutMe Logo">
                </div>
                <span class="text-xl font-bold tracking-tight text-blue-900">Scout<span class="text-blue-500">Me</span></span>
            </a>

            <nav class="flex items-center space-x-4">
                {% if user %}
                    <a href="/profile" class="text-sm font-medium text-gray-700 hover:text-blue-600 transition">My Profile</a>
                    <span class="text-gray-300">|</span>
                    <a href="/auth/logout" class="text-sm font-medium text-red-600 hover:text-red-700 transition">Logout</a>
                {% else %}
                    <a href="/login" class="text-sm font-medium text-gray-700 hover:text-blue-600 transition">Sign In</a>
                    <a href="/register" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition shadow-sm">Sign Up</a>
                {% endif %}
            </nav>

        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-200 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:flex md:items-center md:justify-between text-sm text-gray-500">
            <div class="flex justify-center space-x-6 md:order-2 mb-4 md:mb-0">
                <a href="/about" class="hover:text-gray-600 transition">About Us</a>
                <a href="/terms" class="hover:text-gray-600 transition">Terms of Service</a>
                <a href="/privacy" class="hover:text-gray-600 transition">Privacy Policy</a>
                <a href="/contacts" class="hover:text-gray-600 transition">Support Contacts</a>
            </div>
            <div class="mt-8 md:order-1 md:mt-0 text-center md:text-left">
                <p>&copy; 2026 ScoutMe Platform. All rights reserved.</p>
            </div>
        </div>
    </footer>

</body>
</html>
